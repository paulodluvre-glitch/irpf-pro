<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}IRPF - Controle de Declarações{% endblock %}</title>
    <style>
        :root {
            --bg: #f5f7fb;
            --panel: #ffffff;
            --line: #dfe5ee;
            --text: #172033;
            --muted: #667085;
            --brand: #174ea6;
            --brand-strong: #0f3675;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        a { color: var(--brand); text-decoration: none; }
        .app-shell { min-height: 100vh; display: flex; flex-direction: column; }
        .topbar {
            background: var(--panel);
            border-bottom: 1px solid var(--line);
            padding: 14px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        .brand { font-weight: 700; letter-spacing: .01em; }
        .topbar nav { display: flex; gap: 16px; align-items: center; color: var(--muted); font-size: 14px; }
        .content { width: min(1180px, calc(100% - 32px)); margin: 28px auto; }
        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 22px;
        }
        .grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; }
        .metric {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 16px;
        }
        .metric span { color: var(--muted); font-size: 13px; display: block; margin-bottom: 8px; }
        .metric strong { font-size: 28px; line-height: 1; }
        .button {
            background: var(--brand);
            border: 0;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-weight: 650;
            padding: 10px 14px;
        }
        .button:hover { background: var(--brand-strong); }
        input {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 6px;
            padding: 10px 12px;
            font: inherit;
        }
        label { display: block; color: var(--muted); font-size: 14px; margin-bottom: 6px; }
        .form-row { margin-bottom: 14px; }
        .login-wrap { width: min(420px, calc(100% - 32px)); margin: 80px auto; }
        @media (max-width: 840px) {
            .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .topbar { align-items: flex-start; flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <header class="topbar">
            <div class="brand">IRPF - Controle de Declarações</div>
            <nav>
                {% if request.user.is_authenticated %}
                    <span>{{ request.user.get_full_name|default:request.user.username }}</span>
                    <form method="post" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <button class="button" type="submit">Sair</button>
                    </form>
                {% endif %}
            </nav>
        </header>
        <main class="content">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
